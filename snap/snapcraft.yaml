# Snap package for Flux. Packs the prebuilt jammy .deb (glibc matches the
# core22 base) instead of rebuilding — run packaging/build.sh jammy first.
#
# Build (no snapcraft on host needed):
#   docker run --rm -v "$PWD":/project -w /project \
#     ghcr.io/canonical/snapcraft:8_core22 \
#     snapcraft pack --destructive-mode
#
# Publish (one-time name registration, then per release):
#   snapcraft login
#   snapcraft register flux-monitor
#   snapcraft upload --release=stable flux-monitor_*.snap
name: flux-monitor
base: core22
version: "0.2.2"
summary: Linux system monitor, fleet dashboard and Docker control
description: |
  Flux is a modern system monitor and optimizer (a Stacer replacement) with
  live CPU/memory/disk/network/GPU charts, process management, sensors,
  systemd services, startup apps, a system cleaner, a package uninstaller
  and a Docker control page (containers, images, volumes, networks,
  compose, interactive shell).

  It also monitors whole fleets: add any Linux machine over SSH — agentless,
  nothing to install on the target — and watch every host from one window.

  Note on confinement: the snap runs strictly confined. Local process
  management, sensors and fleet/SSH monitoring work out of the box (connect
  the listed interfaces). Managing the host's systemd services, the system
  cleaner's root categories and the host Docker daemon work best in the
  .deb install from https://ydvsahil03.github.io/flux-apt/.
grade: stable
confinement: strict

apps:
  flux-monitor:
    command: usr/bin/flux
    desktop: usr/share/applications/Flux.desktop
    extensions: [gnome]
    plugs:
      - network
      - network-bind
      - home
      - system-observe
      - process-control
      - hardware-observe
      - mount-observe
      - network-observe
      - docker

parts:
  flux:
    plugin: dump
    source: packaging/dist/jammy/Flux_0.2.2+jammy_amd64.deb
    source-type: deb
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libayatana-appindicator3-1
    override-build: |
      craftctl default
      # Absolute icon path per the Tauri snap guide; Exec is rewritten by
      # snapcraft's desktop-file handling.
      sed -i 's|^Icon=flux$|Icon=${SNAP}/usr/share/icons/hicolor/128x128/apps/flux.png|' \
        "$CRAFT_PART_INSTALL/usr/share/applications/Flux.desktop"
